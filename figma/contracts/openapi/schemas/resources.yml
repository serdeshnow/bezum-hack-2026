AuditFields:
  type: object
  required: [id, createdAt, updatedAt]
  properties:
    id:
      $ref: ./common.yml#/UUID
    createdAt:
      $ref: ./common.yml#/ISODateTime
    updatedAt:
      $ref: ./common.yml#/ISODateTime

User:
  allOf:
    - $ref: '#/AuditFields'
    - type: object
      required: [email, firstName, lastName, role, isActive]
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        avatarUrl:
          type: string
          nullable: true
        role:
          $ref: ./enums.yml#/WorkspaceRole
        isActive:
          type: boolean
        passwordHash:
          type: string
          nullable: true
        lastLoginAt:
          allOf:
            - $ref: ./common.yml#/ISODateTime
          nullable: true

CreateUserRequest:
  type: object
  required: [email, firstName, lastName, role]
  properties:
    email:
      type: string
      format: email
    firstName:
      type: string
    lastName:
      type: string
    avatarUrl:
      type: string
      nullable: true
    role:
      $ref: ./enums.yml#/WorkspaceRole
    isActive:
      type: boolean
      default: true
    passwordHash:
      type: string
      nullable: true

UpdateUserRequest:
  type: object
  properties:
    email:
      type: string
      format: email
    firstName:
      type: string
    lastName:
      type: string
