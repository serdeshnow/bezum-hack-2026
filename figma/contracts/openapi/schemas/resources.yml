      nullable: true
    role:
      $ref: ./enums.yml#/WorkspaceRole
    isActive:
      type: boolean
    passwordHash:
      type: string
      nullable: true
    lastLoginAt:
      allOf:
        - $ref: ./common.yml#/ISODateTime
      nullable: true

