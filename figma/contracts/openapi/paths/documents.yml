paths:
  /document-folders:
    get:
      tags: [Documents]
      summary: List document folders
      parameters:
        - name: projectId
          in: query
          schema:
            $ref: ../schemas/common.yml#/UUID
      responses:
        '200':
          description: Document folders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: ../schemas/resources.yml#/DocumentFolder
