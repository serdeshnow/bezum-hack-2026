      tags: [Documents]
      summary: Create document folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/resources.yml#/CreateDocumentFolderRequest
      responses:
        '201':
          description: Document folder created
          content:
            application/json:
              schema:
                $ref: ../schemas/resources.yml#/DocumentFolder

