paths:
  /meetings:
    get:
      tags: [Meetings]
      summary: List meetings
      parameters:
        - name: projectId
          in: query
          schema:
            $ref: ../schemas/common.yml#/UUID
        - name: epochId
          in: query
          schema:
            $ref: ../schemas/common.yml#/UUID
        - name: sourceContextType
          in: query
          schema:
            $ref: ../schemas/enums.yml#/MeetingSourceContextType
        - name: status
          in: query
          schema:
            $ref: ../schemas/enums.yml#/MeetingStatus
        - name: type
          in: query
          schema:
            $ref: ../schemas/enums.yml#/MeetingType
      responses:
        '200':
          description: Meetings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: ../schemas/resources.yml#/Meeting
    post:
      tags: [Meetings]
      summary: Create meeting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/resources.yml#/CreateMeetingRequest
      responses:
        '201':
          description: Meeting created
          content:
            application/json:
              schema:
                $ref: ../schemas/resources.yml#/Meeting

