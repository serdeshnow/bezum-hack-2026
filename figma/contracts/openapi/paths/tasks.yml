      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            $ref: ../schemas/common.yml#/UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/resources.yml#/CreateTaskTagRequest
      responses:
        '201':
          description: Task tag created
          content:
            application/json:
              schema:
                $ref: ../schemas/resources.yml#/TaskTag

