openapi: 3.1.0
info:
  title: Seamless Service API
  version: 0.2.0
  summary: Backend API for projects, planning, delivery, docs, meetings, and communication
  description: |
    Backend-level OpenAPI specification derived from `figma/contracts/review.md`
    and cross-checked against the product flows in `/figma/src`.

    Notes:
    - API payloads use camelCase names even though the persistence model in `review.md` is expressed in snake_case.
    - The spec includes CRUD coverage for all reviewed tables, plus the main product-facing flows.
servers:
- url: http://localhost:8080/api
  description: Local development
- url: https://seamless.example.com/api
  description: Production example
tags:
- name: Identity
- name: Projects
- name: Planning
- name: Tasks
- name: Documents
- name: Meetings
- name: Delivery
- name: Communication
security:
- bearerAuth: []
