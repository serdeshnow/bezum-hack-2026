components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UUID:
      type: string
      format: uuid
    ISODate:
      type: string
      format: date
    ISODateTime:
      type: string
      format: date-time
    ErrorResponse:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    ListMeta:
      type: object
      required:
      - page
      - pageSize
      - total
      properties:
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
    DeleteResponse:
      type: object
      required:
      - deleted
      properties:
        deleted:
          type: boolean
          const: true
    WorkspaceRole:
      type: string
      enum:
      - customer
      - developer
      - manager
      - admin
    ThemePreference:
      type: string
      enum:
      - light
      - dark
      - system
    ProjectStatus:
      type: string
      enum:
      - draft
      - active
      - at-risk
      - archived
      - completed
    VisibilityMode:
      type: string
      enum:
      - internal
      - customer
    GoalStatus:
      type: string
      enum:
      - not-started
      - in-progress
      - completed
      - blocked
    TaskStatus:
      type: string
      enum:
      - backlog
      - todo
      - in-progress
      - review
      - done
      - cancelled
    TaskPriority:
      type: string
      enum:
      - low
      - medium
      - high
      - critical
    DocumentStatus:
      type: string
      enum:
      - draft
      - in-review
      - approved
      - obsolete
      - rejected
    DocumentAccessScope:
      type: string
      enum:
      - customer
      - manager
      - dev
      - internal
    DocumentLinkEntityType:
      type: string
      enum:
      - epoch
      - task
      - meeting
      - release
      - project
    ChangeSource:
      type: string
      enum:
      - manual
      - meeting
      - task
      - imported
    ApprovalDecision:
      type: string
      enum:
      - pending
      - approved
      - rejected
      - requested-changes
    MeetingStatus:
      type: string
      enum:
      - draft
      - scheduled
      - completed
      - cancelled
    MeetingType:
      type: string
      enum:
      - standup
      - planning
      - review
      - retrospective
      - workshop
      - ad-hoc
    MeetingSourceContextType:
      type: string
      enum:
      - task
      - doc
      - epoch
      - project
      - none
    VoteStatus:
      type: string
      enum:
      - available
      - maybe
      - unavailable
      - no-response
    ReleaseStatus:
      type: string
      enum:
      - planned
      - in-progress
      - deployed
      - failed
      - rolled-back
    PullRequestStatus:
      type: string
      enum:
      - open
      - reviewing
      - merged
      - closed
    AuditFields:
      type: object
      required:
      - id
      - createdAt
      - updatedAt
      properties:
        id:
          "$ref": "./common.yml#/UUID"
        createdAt:
          "$ref": "./common.yml#/ISODateTime"
        updatedAt:
          "$ref": "./common.yml#/ISODateTime"
    User:
      allOf:
      - "$ref": "#/AuditFields"
      - type: object
        required:
        - email
        - firstName
        - lastName
        - role
        - isActive
        properties:
          email:
            type: string
            format: email
          firstName:
            type: string
          lastName:
            type: string
          avatarUrl:
            type: string
            nullable: true
          role:
            "$ref": "./enums.yml#/WorkspaceRole"
          isActive:
            type: boolean
          passwordHash:
            type: string
            nullable: true
          lastLoginAt:
            allOf:
            - "$ref": "./common.yml#/ISODateTime"
            nullable: true
    CreateUserRequest:
      type: object
      required:
      - email
      - firstName
      - lastName
      - role
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        avatarUrl:
          type: string
          nullable: true
        role:
          "$ref": "./enums.yml#/WorkspaceRole"
        isActive:
          type: boolean
          default: true
        passwordHash:
          type: string
          nullable: true
    UpdateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        avatarUrl:
          type: string
          nullable: true
        role:
          "$ref": "./enums.yml#/WorkspaceRole"
        isActive:
          type: boolean
        passwordHash:
          type: string
          nullable: true
        lastLoginAt:
          allOf:
          - "$ref": "./common.yml#/ISODateTime"
          nullable: true
    UserPreferences:
      allOf:
      - "$ref": "#/AuditFields"
      - type: object
        required:
        - userId
        - theme
        - emailNotifications
        - taskAssignmentsEnabled
        - meetingRemindersEnabled
        - releaseNotificationsEnabled
        - mentionNotificationsEnabled
        properties:
          userId:
            "$ref": "./common.yml#/UUID"
          theme:
            "$ref": "./enums.yml#/ThemePreference"
          emailNotifications:
            type: boolean
          taskAssignmentsEnabled:
            type: boolean
          meetingRemindersEnabled:
            type: boolean
          releaseNotificationsEnabled:
            type: boolean
          mentionNotificationsEnabled:
            type: boolean
    CreateUserPreferencesRequest:
      type: object
      required:
      - userId
      - theme
      properties:
        userId:
          "$ref": "./common.yml#/UUID"
        theme:
          "$ref": "./enums.yml#/ThemePreference"
        emailNotifications:
          type: boolean
          default: true
        taskAssignmentsEnabled:
          type: boolean
          default: true
        meetingRemindersEnabled:
          type: boolean
          default: true
        releaseNotificationsEnabled:
          type: boolean
          default: true
        mentionNotificationsEnabled:
          type: boolean
          default: true
    UpdateUserPreferencesRequest:
      type: object
      properties:
        theme:
          "$ref": "./enums.yml#/ThemePreference"
        emailNotifications:
          type: boolean
        taskAssignmentsEnabled:
          type: boolean
        meetingRemindersEnabled:
          type: boolean
        releaseNotificationsEnabled:
          type: boolean
        mentionNotificationsEnabled:
          type: boolean
    Project:
      allOf:
      - "$ref": "#/AuditFields"
      - type: object
        required:
        - key
        - name
        - description
        - status
        - visibilityMode
        - ownerUserId
        - progressPercent
        properties:
          key:
            type: string
          name:
            type: string
          description:
            type: string
          status:
            "$ref": "./enums.yml#/ProjectStatus"
          visibilityMode:
            "$ref": "./enums.yml#/VisibilityMode"
          ownerUserId:
            "$ref": "./common.yml#/UUID"
          activeEpochId:
            allOf:
            - "$ref": "./common.yml#/UUID"
            nullable: true
          dueDate:
            allOf:
            - "$ref": "./common.yml#/ISODate"
            nullable: true
